<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Subtle teal gradient blob -->
  <radialGradient id="blob" cx="30%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#blob)"/>

  <!-- Monogram -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="#1e293b"/>
  <text x="120" y="135" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="40" fill="#2dd4bf" text-anchor="middle">KJ</text>

  <!-- Name -->
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="72" fill="#e2e8f0">Kamil Jaworski</text>

  <!-- Title -->
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="36" fill="#2dd4bf">Software Engineer · .NET · C# · Cloud</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="24" fill="#475569">kamiljaworski.pl</text>
</svg>
